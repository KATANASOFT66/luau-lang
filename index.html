<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luau Deobfuscator & Analyzer</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #1c2333;
            --border: #30363d;
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --green: #3fb950;
            --red: #f85149;
            --orange: #d29922;
            --purple: #bc8cff;
            --cyan: #39d2c0;
            --pink: #f778ba;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header h1 {
            font-size: 1.3em;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 .icon {
            font-size: 1.4em;
            -webkit-text-fill-color: initial;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            border-color: var(--accent);
            background: rgba(88, 166, 255, 0.1);
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            font-weight: 600;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-danger {
            border-color: var(--red);
            color: var(--red);
        }

        .btn-danger:hover {
            background: rgba(248, 81, 73, 0.15);
        }

        .main-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            height: calc(100vh - 65px);
        }

        @media (max-width: 900px) {
            .main-container {
                grid-template-columns: 1fr;
                height: auto;
            }
        }

        .panel {
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            overflow: hidden;
        }

        .panel:last-child {
            border-right: none;
        }

        .panel-header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-shrink: 0;
        }

        .panel-title {
            font-size: 0.85em;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-title .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot-green { background: var(--green); }
        .dot-orange { background: var(--orange); }
        .dot-red { background: var(--red); }
        .dot-blue { background: var(--accent); }
        .dot-purple { background: var(--purple); }

        .panel-body {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        textarea {
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            color: var(--text-primary);
            border: none;
            padding: 16px;
            font-family: inherit;
            font-size: 0.82em;
            line-height: 1.6;
            resize: none;
            outline: none;
            tab-size: 4;
        }

        textarea::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .output-container {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            padding: 0;
        }

        .tabs {
            display: flex;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            flex-shrink: 0;
        }

        .tab {
            padding: 8px 16px;
            font-size: 0.8em;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
            font-family: inherit;
        }

        .tab:hover {
            color: var(--text-primary);
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .tab-content {
            display: none;
            height: 100%;
            overflow-y: auto;
        }

        .tab-content.active {
            display: block;
        }

        .log-entry {
            padding: 4px 16px;
            font-size: 0.78em;
            border-bottom: 1px solid rgba(48, 54, 61, 0.4);
            display: flex;
            gap: 8px;
            align-items: flex-start;
            line-height: 1.5;
        }

        .log-entry:hover {
            background: rgba(88, 166, 255, 0.04);
        }

        .log-tag {
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 0.75em;
            font-weight: 600;
            white-space: nowrap;
            flex-shrink: 0;
            min-width: 70px;
            text-align: center;
        }

        .tag-info { background: rgba(88, 166, 255, 0.15); color: var(--accent); }
        .tag-warn { background: rgba(210, 153, 34, 0.15); color: var(--orange); }
        .tag-error { background: rgba(248, 81, 73, 0.15); color: var(--red); }
        .tag-deobf { background: rgba(63, 185, 80, 0.15); color: var(--green); }
        .tag-string { background: rgba(188, 140, 255, 0.15); color: var(--purple); }
        .tag-flow { background: rgba(57, 210, 192, 0.15); color: var(--cyan); }
        .tag-const { background: rgba(247, 120, 186, 0.15); color: var(--pink); }

        .log-message {
            word-break: break-all;
            color: var(--text-primary);
        }

        .log-message .highlight {
            color: var(--green);
            font-weight: 600;
        }

        .log-message .str-val {
            color: var(--orange);
        }

        .log-message .num-val {
            color: var(--purple);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            padding: 16px;
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
        }

        .stat-card .stat-label {
            font-size: 0.75em;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .stat-card .stat-value {
            font-size: 1.6em;
            font-weight: 700;
        }

        .stat-card .stat-sub {
            font-size: 0.75em;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .string-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8em;
        }

        .string-table th {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 8px 12px;
            text-align: left;
            position: sticky;
            top: 0;
            color: var(--text-secondary);
            font-size: 0.85em;
            text-transform: uppercase;
        }

        .string-table td {
            padding: 6px 12px;
            border-bottom: 1px solid rgba(48, 54, 61, 0.3);
            vertical-align: top;
        }

        .string-table tr:hover td {
            background: rgba(88, 166, 255, 0.04);
        }

        .decoded-str {
            color: var(--green);
            font-weight: 600;
        }

        .method-badge {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 0.8em;
            background: rgba(188, 140, 255, 0.15);
            color: var(--purple);
        }

        .tree-node {
            padding: 4px 0 4px 20px;
            font-size: 0.82em;
        }

        .tree-node .tree-key {
            color: var(--accent);
        }

        .tree-node .tree-type {
            color: var(--text-secondary);
            font-size: 0.85em;
        }

        .progress-bar {
            height: 3px;
            background: var(--border);
            position: relative;
            overflow: hidden;
        }

        .progress-bar .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--purple));
            transition: width 0.3s;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(13, 17, 23, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            flex-direction: column;
            gap: 16px;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            gap: 12px;
            padding: 40px;
            text-align: center;
        }

        .empty-state .icon {
            font-size: 3em;
            opacity: 0.3;
        }

        .code-block {
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            margin: 8px 16px;
            font-size: 0.8em;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        .filter-bar {
            padding: 8px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }

        .filter-input {
            flex: 1;
            padding: 5px 10px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.82em;
            outline: none;
        }

        .filter-input:focus {
            border-color: var(--accent);
        }

        .badge {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.7em;
            font-weight: 600;
            background: rgba(88, 166, 255, 0.15);
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>
            <span class="icon">🔓</span>
            Luau Deobfuscator & Env Analyzer
        </h1>
        <div class="header-actions">
            <button class="btn" onclick="loadSample()" title="Load sample obfuscated code">
                📋 Sample
            </button>
            <button class="btn" onclick="clearAll()">
                🗑️ Clear
            </button>
            <button class="btn btn-primary" onclick="analyze()">
                ⚡ Analyze & Deobfuscate
            </button>
            <button class="btn" onclick="exportResults()">
                💾 Export
            </button>
        </div>
    </div>

    <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>

    <div class="main-container">
        <!-- Input Panel -->
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">
                    <span class="dot dot-green"></span>
                    Input — Obfuscated Luau
                </div>
                <span class="badge" id="inputSize">0 bytes</span>
            </div>
            <div class="panel-body">
                <textarea id="inputCode" placeholder="Paste obfuscated Luau/Lua code here...

Supports:
• XOR / Caesar / Base64 encoded strings
• Control flow flattening detection
• Constant folding
• String table extraction
• Proxy function detection
• Byte array decoding
• Environment access logging
• Dead code detection"></textarea>
            </div>
        </div>

        <!-- Output Panel -->
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">
                    <span class="dot dot-blue"></span>
                    Analysis Output
                </div>
                <span class="badge" id="logCount">0 entries</span>
            </div>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('overview')">📊 Overview</button>
                <button class="tab" onclick="switchTab('strings')">🔤 Strings</button>
                <button class="tab" onclick="switchTab('structure')">🌳 Structure</button>
                <button class="tab" onclick="switchTab('flow')">🔀 Flow</button>
                <button class="tab" onclick="switchTab('log')">📋 Log</button>
                <button class="tab" onclick="switchTab('deobf')">✨ Deobfuscated</button>
            </div>
            <div class="panel-body">
                <div class="loading-overlay" id="loadingOverlay">
                    <div class="spinner"></div>
                    <div style="color: var(--text-secondary); font-size: 0.85em;">Analyzing...</div>
                </div>

                <!-- Overview Tab -->
                <div class="tab-content active" id="tab-overview">
                    <div class="empty-state" id="overviewEmpty">
                        <div class="icon">📊</div>
                        <div>Paste code and click <strong>Analyze</strong> to begin</div>
                    </div>
                    <div id="overviewContent" style="display:none;"></div>
                </div>

                <!-- Strings Tab -->
                <div class="tab-content" id="tab-strings">
                    <div class="filter-bar">
                        <input type="text" class="filter-input" id="stringFilter" placeholder="Filter strings..." oninput="filterStrings()">
                    </div>
                    <div class="output-container" id="stringsContent">
                        <div class="empty-state">
                            <div class="icon">🔤</div>
                            <div>No strings extracted yet</div>
                        </div>
                    </div>
                </div>

                <!-- Structure Tab -->
                <div class="tab-content" id="tab-structure">
                    <div class="output-container" id="structureContent">
                        <div class="empty-state">
                            <div class="icon">🌳</div>
                            <div>No structure analysis yet</div>
                        </div>
                    </div>
                </div>

                <!-- Flow Tab -->
                <div class="tab-content" id="tab-flow">
                    <div class="output-container" id="flowContent">
                        <div class="empty-state">
                            <div class="icon">🔀</div>
                            <div>No control flow analysis yet</div>
                        </div>
                    </div>
                </div>

                <!-- Log Tab -->
                <div class="tab-content" id="tab-log">
                    <div class="filter-bar">
                        <input type="text" class="filter-input" id="logFilter" placeholder="Filter logs..." oninput="filterLogs()">
                    </div>
                    <div class="output-container" id="logContent"></div>
                </div>

                <!-- Deobfuscated Tab -->
                <div class="tab-content" id="tab-deobf">
                    <div class="output-container" id="deobfContent">
                        <div class="empty-state">
                            <div class="icon">✨</div>
                            <div>No deobfuscated output yet</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
